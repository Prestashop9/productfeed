admin_productfeed_list:
  path: productfeed/list
  methods: [GET]
  defaults:
    _controller: PrestaShop\Module\ProductFeed\Controller\Admin\ProductFeedAdminController::indexAction
    _legacy_controller: 'AdminProductFeed'
    _legacy_link: 'AdminProductFeed'

admin_productfeed_toggle:
  path: productfeed/toggle
  methods: [POST]
  defaults:
    _controller: PrestaShop\Module\ProductFeed\Controller\Admin\ProductFeedAdminController::toggleAction
    _legacy_controller: 'AdminProductFeed'
    _legacy_link: 'AdminProductFeed'

admin_productfeed_push:
  path: productfeed/push
  methods: [POST]
  defaults:
    _controller: PrestaShop\Module\ProductFeed\Controller\Admin\ProductFeedAdminController::pushAction
    _legacy_controller: 'AdminProductFeed'
    _legacy_link: 'AdminProductFeed'

admin_productfeed_reorder:
  path: productfeed/reorder
  methods: [POST]
  defaults:
    _controller: PrestaShop\Module\ProductFeed\Controller\Admin\ProductFeedAdminController::reorderAction
    _legacy_controller: 'AdminProductFeed'
    _legacy_link: 'AdminProductFeed'

admin_productfeed_badge:
  path: productfeed/badge
  methods: [POST]
  defaults:
    _controller: PrestaShop\Module\ProductFeed\Controller\Admin\ProductFeedAdminController::badgeAction
    _legacy_controller: 'AdminProductFeed'
    _legacy_link: 'AdminProductFeed'

admin_productfeed_settings:
  path: productfeed/settings
  methods: [GET, POST]
  defaults:
    _controller: PrestaShop\Module\ProductFeed\Controller\Admin\ProductFeedAdminController::settingsAction
    _legacy_controller: 'AdminProductFeed'
    _legacy_link: 'AdminProductFeed'
